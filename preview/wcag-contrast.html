<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>WCAG Contrast</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 14px 18px; background: #fff; font-family: Arial, sans-serif; font-size: 11px; }
  table { width: 660px; border-collapse: collapse; }
  th { text-align: left; font-weight: 700; color: var(--ga-navy-500); border-bottom: 2px solid var(--ga-navy-500); padding: 6px; font-size: 10px; }
  td { border-bottom: 1px solid var(--ga-navy-100); padding: 6px; }
  .swatch { display: inline-block; padding: 4px 10px; border-radius: 2px; font-weight: 700; font-size: 11px; }
  .pass { color: var(--ga-success); font-weight: 700; }
  .fail { color: var(--ga-crimson-500); font-weight: 700; }
</style></head>
<body>
<table>
  <thead><tr><th>Pair</th><th>Sample</th><th>Ratio</th><th>Status</th></tr></thead>
  <tbody>
    <tr><td>White on Navy</td><td><span class="swatch" style="background:#002341;color:#fff">Aa</span></td><td>15.95:1</td><td class="pass">✓ AAA</td></tr>
    <tr><td>Navy on White</td><td><span class="swatch" style="background:#fff;color:#002341;border:1px solid #BFC8CF">Aa</span></td><td>15.95:1</td><td class="pass">✓ AAA</td></tr>
    <tr><td>White on Crimson</td><td><span class="swatch" style="background:#92153A;color:#fff">Aa</span></td><td>8.80:1</td><td class="pass">✓ AAA</td></tr>
    <tr><td>Crimson on White</td><td><span class="swatch" style="background:#fff;color:#92153A;border:1px solid #BFC8CF">Aa</span></td><td>8.80:1</td><td class="pass">✓ AAA</td></tr>
    <tr><td>Gray-700 on White</td><td><span class="swatch" style="background:#fff;color:#4A4B4D;border:1px solid #BFC8CF">Aa</span></td><td>8.10:1</td><td class="pass">✓ AAA</td></tr>
    <tr><td>Gray (#797A7D) on White</td><td><span class="swatch" style="background:#fff;color:#797A7D;border:1px solid #BFC8CF">Aa</span></td><td>4.29:1</td><td class="fail">⚠ Fail</td></tr>
  </tbody>
</table>
</body></html>
