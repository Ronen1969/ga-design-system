<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Spacing Tokens</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 16px 20px; background: #fff; font-family: Arial, sans-serif; }
  .row { display: grid; grid-template-columns: 110px 1fr 110px; gap: 12px; align-items: center; margin-bottom: 8px; width: 660px; }
  .token { font-family: var(--ga-font-mono); font-size: 11px; color: var(--ga-navy-500); font-weight: 700; }
  .bar { height: 14px; background: var(--ga-crimson-500); border-radius: 2px; }
  .meta { font-size: 11px; color: var(--ga-gray-700); text-align: right; }
</style></head>
<body>
<div class="row"><div class="token">space-1</div><div class="bar" style="width:8pt"></div><div class="meta">8pt · 160 DXA</div></div>
<div class="row"><div class="token">space-2</div><div class="bar" style="width:16pt"></div><div class="meta">16pt · 320 DXA</div></div>
<div class="row"><div class="token">space-3</div><div class="bar" style="width:24pt"></div><div class="meta">24pt · 480 DXA</div></div>
<div class="row"><div class="token">space-4</div><div class="bar" style="width:32pt"></div><div class="meta">32pt · 640 DXA</div></div>
<div class="row"><div class="token">space-6</div><div class="bar" style="width:48pt"></div><div class="meta">48pt · 960 DXA</div></div>
<div class="row"><div class="token">space-8</div><div class="bar" style="width:64pt"></div><div class="meta">64pt · 1280 DXA</div></div>
</body></html>
