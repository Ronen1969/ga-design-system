<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: #fff; font-family: Arial, sans-serif; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; width: 652px; box-sizing: border-box; }
  button { font-family: Arial, sans-serif; font-weight: 700; font-size: 12px; letter-spacing: 0.04em; padding: 10px 18px; border-radius: 2px; border: none; cursor: pointer; transition: background 150ms ease-in-out, color 150ms ease-in-out; }
  .primary { background: var(--ga-crimson-500); color: #fff; }
  .primary:hover { background: var(--ga-crimson-700); }
  .secondary { background: var(--ga-navy-500); color: #fff; }
  .secondary:hover { background: var(--ga-navy-700); }
  .ghost { background: transparent; color: var(--ga-navy-500); border: 1px solid var(--ga-navy-500); }
  .ghost:hover { background: var(--ga-navy-50); }
  .disabled { background: var(--ga-navy-50); color: var(--ga-gray-700); cursor: not-allowed; opacity: 0.5; }
  .label { font-family: var(--ga-font-mono); font-size: 10px; color: var(--ga-gray-700); text-transform: uppercase; letter-spacing: 0.06em; width: 100%; }
</style></head>
<body>
<div class="label">Buttons — primary, secondary, ghost, disabled</div>
<button class="primary">Solicitar Avaliação</button>
<button class="secondary">Baixar PDF</button>
<button class="ghost">Cancelar</button>
<button class="disabled">Indisponível</button>
</body></html>
