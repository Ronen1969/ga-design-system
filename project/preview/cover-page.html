<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Cover Page</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 0; background: var(--ga-navy-50); font-family: Arial, sans-serif; display: flex; align-items: center; justify-content: center; height: 320px; }
  .page { width: 240px; height: 300px; background: #fff; box-shadow: 0 2px 8px rgba(0,35,65,0.10); padding: 18px 20px; box-sizing: border-box; display: flex; flex-direction: column; }
  .logo { width: 110px; height: auto; margin-bottom: 16px; }
  .cap { font-size: 7.5px; font-weight: 700; color: var(--ga-crimson-500); letter-spacing: 0.10em; text-transform: uppercase; margin-bottom: 8px; }
  .title { font-size: 14px; font-weight: 700; color: var(--ga-navy-500); line-height: 1.15; margin-bottom: 6px; }
  .sub { font-size: 9.5px; color: var(--ga-gray-700); line-height: 1.4; }
  .spacer { flex: 1; }
  .meta { font-size: 8px; color: var(--ga-gray-700); border-top: 2px solid var(--ga-navy-500); padding-top: 8px; line-height: 1.5; }
  .info { padding: 0 32px; max-width: 260px; }
  .info h3 { font-family: Arial, sans-serif; font-size: 12px; color: var(--ga-navy-500); margin: 0 0 4px 0; }
  .info p { font-size: 11px; color: var(--ga-gray-700); margin: 0; line-height: 1.5; }
</style></head>
<body>
<div class="page">
  <img class="logo" src="../assets/logo-global-advising.png" alt="GA">
  <div class="cap">Relatório de Consultoria</div>
  <div class="title">Avaliação de Riscos — Sede Corporativa</div>
  <div class="sub">Escopo: perímetro, acesso, CFTV, plano de continuidade.</div>
  <div class="spacer"></div>
  <div class="meta">Cliente: Acme S.A.<br>Data: 15/04/2026<br>Ref: GA-0142</div>
</div>
<div class="info">
  <h3>Cover page — formal report</h3>
  <p>Logo · caption · H1 title · scope sub · client/date/ref slug above the rule.</p>
</div>
</body></html>
