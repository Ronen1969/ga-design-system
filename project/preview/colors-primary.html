<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Primary Colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--ga-font-formal); background: #fff; padding: 16px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 668px; }
  .sw { border-radius: 4px; overflow: hidden; border: 1px solid var(--ga-navy-100); }
  .chip { height: 90px; }
  .meta { padding: 8px 10px; font-size: 11px; line-height: 1.4; }
  .name { font-weight: 700; color: var(--ga-navy-500); letter-spacing: 0.04em; text-transform: uppercase; }
  .hex { color: var(--ga-gray-700); font-family: var(--ga-font-mono); font-size: 10px; }
  .use { color: var(--ga-gray-700); font-size: 10px; margin-top: 2px; }
</style></head>
<body><div class="row">
  <div class="sw"><div class="chip" style="background:#92153A"></div><div class="meta"><div class="name">Crimson</div><div class="hex">#92153A</div><div class="use">Action · H2 · emphasis</div></div></div>
  <div class="sw"><div class="chip" style="background:#002341"></div><div class="meta"><div class="name">Navy</div><div class="hex">#002341</div><div class="use">H1 · primary text</div></div></div>
  <div class="sw"><div class="chip" style="background:#797A7D"></div><div class="meta"><div class="name">Gray</div><div class="hex">#797A7D</div><div class="use">Secondary (⚠ AA fail)</div></div></div>
  <div class="sw"><div class="chip" style="background:#1A1A1A"></div><div class="meta"><div class="name">Black</div><div class="hex">#1A1A1A</div><div class="use">Body</div></div></div>
</div></body></html>
